<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vimamall | Custom Business Software in 10 Days</title>
    <meta http-equiv="refresh" content="0; url=/industries/">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #1e3a5f 0%, #2d4a6f 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }
        .container {
            text-align: center;
            padding: 40px;
        }
        h1 { font-size: 48px; margin-bottom: 20px; }
        p { font-size: 20px; opacity: 0.9; margin-bottom: 30px; }
        .btn {
            display: inline-block;
            padding: 15px 40px;
            background: #00d4aa;
            color: #1e3a5f;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 18px;
            transition: transform 0.3s;
        }
        .btn:hover { transform: translateY(-3px); }
        .links {
            margin-top: 40px;
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .link {
            padding: 12px 25px;
            background: rgba(255,255,255,0.1);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.3s;
        }
        .link:hover { background: rgba(255,255,255,0.2); }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 Vimamall</h1>
        <p>Custom Business Software in 10 Days<br>80% Below Market Price</p>
        <a href="/industries/" class="btn">Explore Industry Solutions</a>
        
        <div class="links">
            <a href="/industries/" class="link">Industry Solutions</a>
            <a href="/services/" class="link">Our Services</a>
            <a href="/payment/" class="link">Pricing</a>
        </div>
    </div>
</body>
</html>
